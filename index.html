<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HK SMART GLASSES - Global Official Platform</title>
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 20px; }
        
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background-color: #444; color: white; padding: 12px 24px; border: none; cursor: pointer; font-weight: bold; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #222; min-width: 200px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); z-index: 100; max-height: 400px; overflow-y: auto; }
        .dropdown-content a { color: white; padding: 12px; display: block; text-decoration: none; border-bottom: 1px solid #333; cursor: pointer; }
        .dropdown:hover .dropdown-content { display: block; }

        /* 5열 2줄 레이아웃으로 복구 */
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-top: 30px; }
        .box { background: #2a2a2a; padding: 20px; border: 1px solid #444; border-radius: 8px; }
        .box h3 { margin: 0 0 10px 0; color: #ffd700; font-size: 15px; }
        .box p { font-size: 12px; color: #ccc; line-height: 1.5; margin: 0; }
    </style>
</head>
<body>

<div class="header">
    <h1>HK SMART GLASSES</h1>
    <div class="dropdown">
        <button class="dropbtn">Global Languages (14) ▼</button>
        <div class="dropdown-content" id="langList"></div>
    </div>
</div>

<div class="grid-container" id="featureGrid"></div>

<!-- 하단 이메일 푸터 -->
<footer style="margin-top: 40px; padding: 20px; border-top: 1px solid #444; text-align: center; color: #888; font-size: 14px;">
    <p>Contact: <a href="mailto:Support@hkwb.world" style="color: #ffd700; text-decoration: none;">Support@hkwb.world</a></p>
</footer>

<script>
    const HK_DATA = {
        "Korean": [
            ["Neural Auth (생체 인증)", "뇌파 및 생체 신호를 활용한 가장 안전한 본인 인증 시스템."],
            ["Sync (실시간 동기화)", "모든 기기와의 끊김 없는 실시간 데이터 연결."],
            ["Payment (간편 결제)", "시선과 제스처만으로 이루어지는 차세대 결제."],
            ["Sentiment (감정 분석)", "대화 상대의 감정을 실시간으로 파악하여 소통 지원."],
            ["Translation (실시간 번역)", "언어 장벽 없는 전 세계 실시간 통역."],
            ["Management (통합 관리)", "글라스의 모든 상태 및 연결 기기 관리."],
            ["Monitoring (상태 모니터링)", "기기 가동 및 보안 시스템 실시간 추적."],
            ["Energy Mgmt (전력 효율화)", "스마트 배터리 최적화를 통한 에너지 효율."],
            ["Vision AI (공간 인식)", "고도화된 공간 인식 및 지능형 환경 처리."],
            ["HK Cloud (개인 클라우드)", "개인 데이터를 안전하게 보관하는 전용 클라우드."]
        ],
        /* 나머지 언어 데이터는 기존과 동일하게 유지하시면 됩니다 */
        "English": [["Neural Auth", "Secure biometric authentication using brainwaves."], ["Sync", "Seamless real-time synchronization across devices."], ["Payment", "Next-gen payment via gaze and gesture control."], ["Sentiment", "Real-time sentiment analysis for communication."], ["Translation", "Free conversation across borders without barriers."], ["Management", "Centralized management of glass and devices."], ["Monitoring", "Real-time tracking of device status and security."], ["Energy Mgmt", "Smart battery optimization for extended use."], ["Vision AI", "Intelligent spatial and environmental processing."], ["HK Cloud", "Secure cloud storage for personalized data."]]
        // ... 이하 생략 (전체 데이터 유지)
    };

    const langList = document.getElementById('langList');
    Object.keys(HK_DATA).forEach(lang => {
        langList.innerHTML += `<a onclick="updateGrid('${lang}')">${lang}</a>`;
    });

    function updateGrid(lang) {
        const grid = document.getElementById('featureGrid');
        grid.innerHTML = '';
        HK_DATA[lang].forEach(item => {
            grid.innerHTML += `<div class="box"><h3>${item[0]}</h3><p>${item[1]}</p></div>`;
        });
    }
    updateGrid('Korean');
</script>
</body>
</html>
